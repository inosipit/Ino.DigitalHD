<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ino.digital | HD Ultra Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-card { text-align: center; max-width: 380px; width: 100%; }
        .logo-box { margin-bottom: 20px; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #bc13fe; box-shadow: 0 0 20px #bc13fe; object-fit: cover; }
        h2 { font-weight: 700; margin: 10px 0; letter-spacing: 2px; }
        .tagline { color: #888; font-size: 0.8em; margin-bottom: 30px; text-transform: uppercase; }
        .file-upload { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type="file"] { width: 100%; color: #888; }
        #progress-container { display: none; margin: 20px 0; align-items: center; justify-content: space-between; }
        .battery-bar { flex: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #444; margin-right: 10px; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #bc13fe, #e082ff); transition: width 0.3s; }
        #progress-text { font-weight: bold; color: #bc13fe; min-width: 40px; }
        .btn-process { background: #bc13fe; border: none; color: white; padding: 15px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-process:disabled { background: #444; cursor: not-allowed; }
        #hasil-foto { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; border: 2px solid #bc13fe; }
        .btn-download { display: none; background: #fff; color: #000; padding: 15px; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center; }
        footer { padding: 30px 20px; font-size: 0.75em; color: #555; text-align: center; background: #050505; }
        .legal-links { margin-top: 10px; }
        .legal-links a { color: #bc13fe; text-decoration: none; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="app-card">
            <div class="logo-box">
                <img src="https://files.catbox.moe/fmzx1o.png" alt="Logo" class="logo-img">
            </div>
            <h2>INO.DIGITAL HD</h2>
            <p class="tagline">Cloud AI Photo Enhancer</p>
            <div class="file-upload"><input type="file" id="fileInput" accept="image/*"></div>
            <button id="btnUpload" class="btn-process" onclick="uploadFoto()">MULAI PROSES HD</button>
            <div id="progress-container">
                <div class="battery-bar"><div id="progress-fill"></div></div>
                <div id="progress-text">0%</div>
            </div>
            <img id="hasil-foto" src="" alt="Hasil">
            <a id="btn-download" href="#" download="InoDigital_HD.jpg" class="btn-download">SIMPAN KE GALERI</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <b>Ino.digital</b>. All Rights Reserved.</p>
        <div class="legal-links">
            <a onclick="alert('PRIVACY POLICY:\n1. Foto dihapus otomatis dalam 24 jam.\n2. Kami tidak menyimpan data pribadi Anda.\n3. Proses dilakukan secara anonim via AI.')">Privacy Policy</a> | 
            <a onclick="alert('USAGE PROTOCOL:\n1. Dilarang upload konten asusila/ilegal.\n2. Penyalahgunaan layanan akan diblokir.\n3. Hasil AI tidak selalu 100% sempurna.')">Usage Protocol</a>
        </div>
    </footer>

     <script>
        // --- GANTI LINK INI SETIAP RESTART CLOUDFLARE ---
        // Pastikan pakai link .trycloudflare.com kamu yang terbaru
        const NGROK_URL = "https://assembled-residential-locate-effectiveness.trycloudflare.com"; 
        let isWaiting = false;

        async function uploadFoto() {
            if (isWaiting) return;

            const fileInput = document.getElementById('fileInput');
            const btnUpload = document.getElementById('btnUpload');
            if (fileInput.files.length === 0) return alert("Pilih foto dulu, Bos!");

            isWaiting = true;
            btnUpload.disabled = true;

            // Progress Bar Animation
            document.getElementById('progress-container').style.display = "flex";
            let width = 0;
            let bar = setInterval(() => {
                if (width >= 95) clearInterval(bar);
                else { 
                    width++; 
                    document.getElementById('progress-fill').style.width = width + '%'; 
                    document.getElementById('progress-text').innerText = width + '%'; 
                }
            }, 300); // 300ms biar pas sama 30 detik

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // KIRIM KE TERMUX (Tambahkan Header Bypass)
                const res = await fetch(NGROK_URL + '/api/remote-upload', { 
                    method: 'POST', 
                    body: formData,
                    headers: { "bypass-tunnel-reminder": "true" } // <--- WAJIB ADA
                });
                
                if (res.ok) {
                    // Timer Mundur 30 Detik
                    let timeLeft = 30;
                    let timer = setInterval(() => {
                        btnUpload.innerText = `Tunggu ${timeLeft}s...`;
                        timeLeft--;
                        if (timeLeft < 0) {
                            clearInterval(timer);
                            clearInterval(bar);
                            document.getElementById('progress-fill').style.width = '100%';
                            document.getElementById('progress-text').innerText = '100%';
                            isWaiting = false;
                            btnUpload.disabled = false;
                            btnUpload.innerText = "MULAI PROSES HD";
                            
                            // Tampilkan Info Download
                            alert("✅ Selesai! Foto dikirim ke Bot HD.");
                        }
                    }, 1000);
                }
            } catch (e) { 
                alert("Termux Offline! Cek Cloudflare kamu."); 
                isWaiting = false; 
                btnUpload.disabled = false; 
                btnUpload.innerText = "MULAI PROSES HD";
                clearInterval(bar);
            }
        }
    </script>

</body>
  </html>
